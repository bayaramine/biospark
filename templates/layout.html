<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BioSpark — Clinical Biostatistics & AI Consulting | Mohamed Amine Bayar, PhD</title>
  <meta name="description" content="BioSpark is a clinical biostatistics and AI consulting firm led by Mohamed Amine Bayar, PhD. 13 years across Phase I–III trials, J&J, Novartis, Gustave Roussy. FDA & EMA regulatory expertise."/>
  <meta name="keywords" content="BioSpark, biostatistics, clinical trials, AI, machine learning, consulting, Mohamed Amine Bayar, FDA, EMA, Phase III, CDISC, oncology"/>
  <meta name="author" content="Mohamed Amine Bayar, PhD"/>
  <link rel="canonical" href="https://biospark.fr"/>
  <meta name="google-site-verification" content="rwvWZXAsouTu0JSY4IgUvxO_4PiCplqQ75qOOdYaUxI"/>

  <!-- Open Graph (LinkedIn, Facebook previews) -->
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://biospark.fr"/>
  <meta property="og:title" content="BioSpark — Clinical Biostatistics & AI Consulting"/>
  <meta property="og:description" content="Senior biostatistics and clinical AI consulting. 13 years across Phase I–III trials at J&J, Novartis, and Gustave Roussy."/>
  <meta property="og:image" content="https://biospark.fr/static/images/portrait.jpg"/>

  <!-- Twitter/X card -->
  <meta name="twitter:card" content="summary"/>
  <meta name="twitter:title" content="BioSpark — Clinical Biostatistics & AI Consulting"/>
  <meta name="twitter:description" content="Senior biostatistics and clinical AI consulting. 13 years across Phase I–III trials."/>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600&family=Noto+Sans+Arabic:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}"/>
</head>
<body>

<div class="bg-canvas"></div>
<div class="grid-bg"></div>

<!-- NAV -->
<nav>
  <a href="/" class="nav-logo">Bio<span>Spark</span></a>
  <ul class="nav-links">
    <li><a href="/"         class="{{ 'nav-active' if active_page == 'home' }}"     data-i18n="nav.home">Home</a></li>
    <li><a href="/about"    class="{{ 'nav-active' if active_page == 'about' }}"    data-i18n="nav.about">About</a></li>
    <li><a href="/services" class="{{ 'nav-active' if active_page == 'services' }}" data-i18n="nav.services">Services</a></li>
    <li><a href="/contact"  class="{{ 'nav-active' if active_page == 'contact' }}"  data-i18n="nav.contact">Contact</a></li>
  </ul>
  <div class="lang-switcher">
    <button class="lang-btn active" onclick="setLang('en')">EN</button>
    <button class="lang-btn"        onclick="setLang('fr')">FR</button>
    <button class="lang-btn"        onclick="setLang('ar')">AR</button>
  </div>
</nav>

<!-- PAGE CONTENT -->
{% block content %}{% endblock %}

<!-- FOOTER -->
<footer>
  <div class="footer-logo">Bio<span>Spark</span></div>
  <div class="footer-copy">
    © 2026 Mohamed Amine BAYAR —
    <span data-i18n="footer.copy">All rights reserved</span>
    <span class="footer-visits">· {{ "{:,}".format(visit_count) }} visits</span>
  </div>
</footer>

<script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
